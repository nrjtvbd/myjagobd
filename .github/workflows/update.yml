name: Jagobd Auto Playlist
on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Requests
        run: pip install requests

      - name: Grab Al Jazeera Link
        run: |
          python <<EOF
          import requests
          import re

          def get_stream():
              url = 'https://www.jagobd.com/aljazeera'
              headers = {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36',
                  'Referer': 'https://www.jagobd.com/'
              }
              
              try:
                  # ১. মূল পেজ থেকে আইফ্রেম খোঁজা
                  response = requests.get(url, headers=headers, timeout=15).text
                  iframe_match = re.search(r'iframe src=\"(.*?)\"', response)
                  
                  if iframe_match:
                      iframe_url = iframe_match.group(1)
                      if iframe_url.startswith('//'): iframe_url = 'https:' + iframe_url
                      
                      # ২. আইফ্রেমের ভেতর থেকে সরাসরি m3u8 বা টোকেন বের করা
                      res_iframe = requests.get(iframe_url, headers=headers, timeout=15).text
                      
                      # wmsAuthSign খুঁজে বের করা
                      token_match = re.search(r'wmsAuthSign=([\w.~-]+)', res_iframe)
                      path_match = re.search(r'c3VydmVyX8[\w.~-]+', res_iframe) # আপনার লগের সেই বিশেষ পাথ
                      
                      if token_match:
                          token = token_match.group(1)
                          # পাথ যদি আইফ্রেম থেকে পাওয়া যায় তবে সেটি ব্যবহার করা, নাহলে ডিফল্ট
                          path = path_match.group(0) if path_match else "c3VydmVyX8RpbEU9Mi8xNy8yMFDEEHGcfRgzQ6NTAgdEoaeFzbF92YWxIZTO0U0ezN1IzMyfvcEdsEfeDeKiNkVN3PTOmdFseWRtaW51aiPhnPTI2"
                          
                          return f"https://static.jagobd.com.bd/{path}/aljazeera.stream/playlist.m3u8?wmsAuthSign={token}"
                  
                  return None
              except Exception as e:
                  print(f"Error: {e}")
                  return None

          final_link = get_stream()
          
          m3u_content = "#EXTM3U\n"
          if final_link:
              m3u_content += "#EXTINF:-1, Al Jazeera English\n"
              m3u_content += "#EXTVLCOPT:http-user-agent=Mozilla/5.0\n"
              m3u_content += "#EXTVLCOPT:http-referer=https://tvz.jagobd.com/\n"
              m3u_content += f"{final_link}\n"
              print("Successfully generated link!")
          else:
              m3u_content += "# No Link Found\n"
              print("Link not found, creating empty file.")

          with open('jagobd.m3u', 'w') as f:
              f.write(m3u_content)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add jagobd.m3u
          git commit -m "Update Al Jazeera Link" || exit 0
          git push
