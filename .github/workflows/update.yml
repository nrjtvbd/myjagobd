import requests
          import re

          # আপনার দেওয়া সেই পুরনো কিন্তু কার্যকর ফরম্যাট
          # আমরা চেষ্টা করছি নতুন পাথ আইডি খুঁজে বের করতে
          channel_slug = "aljazeera" # প্রথমে আল জাজিরা দিয়ে টেস্ট
          
          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
              'Referer': 'https://www.jagobd.com/',
              'Origin': 'https://www.jagobd.com'
          }

          try:
              # জাগোবিডি পেজ থেকে বর্তমান 'Path' এবং 'Token' সংগ্রহ
              res = requests.get(f"https://www.jagobd.com/{channel_slug}", headers=headers).text
              
              # আপনার লিঙ্কের মতো সেই বড় পাথ আইডি খোঁজা
              path_match = re.search(r'https?://[a-z0-9.]+/([a-zA-Z0-9_-]{50,})/aljazeera', res)
              token_match = re.search(r'wmsAuthSign=([\w.~-]+)', res)

              if token_match:
                  token = token_match.group(1)
                  # যদি পাথ আইডি না পাওয়া যায়, তবে নতুন স্ট্যাটিক সার্ভার ব্যবহার
                  path_id = path_match.group(1) if path_match else "live" 
                  
                  final_link = f"https://static.jagobd.com.bd/{path_id}/{channel_slug}.stream/playlist.m3u8?wmsAuthSign={token}"
                  print(f"Generated Link: {final_link}")
                  
                  # ফাইল রাইট করা
                  with open('jagobd.m3u', 'w') as f:
                      f.write(f"#EXTM3U\n#EXTINF:-1, Al Jazeera\n#EXTVLCOPT:http-referer=https://tvz.jagobd.com/\n{final_link}")
              else:
                  print("Token not found. Jagobd is blocking GitHub IP.")
          except Exception as e:
              print(f"Error: {e}")
