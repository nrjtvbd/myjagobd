python -c "
          import requests
          import re

          channels = {
              'Al Jazeera': 'aljazeera',
              'Somoy TV': 'somoy-tv',
              'Ekattor TV': 'ekattor-tv',
              'BTV World': 'btv-world'
          }

          m3u_text = '#EXTM3U\n'
          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36',
              'Referer': 'https://www.jagobd.com/'
          }

          for name, slug in channels.items():
              try:
                  # ১. মূল পেজ থেকে আইফ্রেম ইউআরএল খোঁজা
                  main_res = requests.get(f'https://www.jagobd.com/{slug}', headers=headers, timeout=10).text
                  iframe_url = re.search(r'iframe src=\"(.*?)\"', main_res)
                  
                  if iframe_url:
                      target_url = iframe_url.group(1)
                      # ২. আইফ্রেম পেজ ভিজিট করে টোকেন খোঁজা
                      headers['Referer'] = f'https://www.jagobd.com/{slug}'
                      iframe_res = requests.get(target_url, headers=headers, timeout=10).text
                      
                      # wmsAuthSign খুঁজি
                      token_match = re.search(r'wmsAuthSign=([\w.~-]+)', iframe_res)
                      
                      if token_match:
                          token = token_match.group(1)
                          # জাগোবিডি এখন static.jagobd.com.bd অথবা অন্য সার্ভার ব্যবহার করতে পারে
                          link = f'https://static.jagobd.com.bd/live/{slug}.stream/playlist.m3u8?wmsAuthSign={token}'
                          m3u_text += f'#EXTINF:-1, {name}\n'
                          m3u_text += f'#EXTVLCOPT:http-referer=https://tvz.jagobd.com/\n'
                          m3u_text += f'{link}\n'
                          print(f'Found token for {name}')
                  else:
                      print(f'No iframe found for {name}')
              except Exception as e:
                  print(f'Error for {name}: {e}')

          with open('jagobd.m3u', 'w') as f:
              f.write(m3u_text)
          "
