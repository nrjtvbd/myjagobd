name: Jagobd Dynamic Update
on:
  schedule:
    - cron: '*/20 * * * *' # প্রতি ২০ মিনিট পর পর টোকেন রিফ্রেশ করবে
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Requests
        run: pip install requests

      - name: Generate M3U
        run: |
          python <<EOF
          import requests
          import re
          import json

          def get_link():
              slug = "aljazeera"
              # ১. মূল পেজ ভিজিট (মোবাইল হেডার দিয়ে)
              url = f"https://www.jagobd.com/{slug}"
              headers = {
                  'User-Agent': 'Mozilla/5.0 (iPhone; CPU iPhone OS 16_6 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/16.6 Mobile/15E148 Safari/604.1',
                  'Referer': 'https://www.jagobd.com/',
                  'Accept': '*/*'
              }

              try:
                  print(f"Fetching {slug}...")
                  response = requests.get(url, headers=headers, timeout=20)
                  html = response.text

                  # ২. টোকেন (wmsAuthSign) খোঁজা
                  token_match = re.search(r'wmsAuthSign=([\w.~-]+)', html)
                  
                  # ৩. পাথ আইডি খোঁজা (পুরনো app24 এর বদলে নতুন স্ট্রাকচার)
                  # এটি সাধারণত c3V... দিয়ে শুরু হয়
                  path_match = re.search(r'([a-zA-Z0-9]{50,150})/aljazeera\.stream', html)

                  if not token_match:
                      # ব্যাকআপ: আইফ্রেম চেক করা
                      iframe_url = f"https://tvz.jagobd.com/{slug}"
                      headers['Referer'] = url
                      iframe_res = requests.get(iframe_url, headers=headers, timeout=15).text
                      token_match = re.search(r'wmsAuthSign=([\w.~-]+)', iframe_res)
                      path_match = re.search(r'([a-zA-Z0-9]{50,150})/aljazeera\.stream', iframe_res)

                  if token_match and path_match:
                      token = token_match.group(1)
                      path_id = path_match.group(1)
                      # আপনার পুরনো স্টাইলের নতুন ভার্সন
                      return f"https://static.jagobd.com.bd/{path_id}/aljazeera.stream/playlist.m3u8?wmsAuthSign={token}"
                  
                  # যদি প্যাটার্ন না মেলে, তবে সরাসরি সোর্স থেকে লিঙ্ক খোঁজা
                  direct_match = re.search(r'source:\s*"(.*?)"', html)
                  if direct_match:
                      return direct_match.group(1)

              except Exception as e:
                  print(f"Error: {e}")
              return None

          m3u_content = "#EXTM3U\n"
          final_link = get_link()

          if final_link:
              m3u_content += "#EXTINF:-1, Al Jazeera English\n"
              # রেফারার মাস্ট, নাহলে প্লেয়ারে চলবে না
              m3u_content += "#EXTVLCOPT:http-referer=https://tvz.jagobd.com/\n"
              m3u_content += f"{final_link}\n"
              print("Successfully generated link!")
          else:
              m3u_content += "# Error: Could not bypass Jagobd security on GitHub IP\n"
              print("Failed to get token.")

          with open('jagobd.m3u', 'w') as f:
              f.write(m3u_content)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add jagobd.m3u
          git commit -m "Update Jagobd [$(date)]" || exit 0
          git push
