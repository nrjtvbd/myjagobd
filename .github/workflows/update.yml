name: Jagobd Final GitHub Try
on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  update-m3u:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Get Al Jazeera Link
        run: |
          # ১. ব্রাউজার সেজে পেজটি ফেচ করা
          USER_AGENT="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
          REFERER="https://www.jagobd.com/"
          
          echo "Fetching Al Jazeera page..."
          HTML_CONTENT=$(curl -s -L -A "$USER_AGENT" -e "$REFERER" "https://www.jagobd.com/aljazeera")
          
          # ২. টোকেন (wmsAuthSign) খুঁজে বের করা
          TOKEN=$(echo "$HTML_CONTENT" | grep -o 'wmsAuthSign=[^"&]*' | head -1 | cut -d'=' -f2)
          
          # ৩. পাথ আইডি (সেই লম্বা কোডটি) খুঁজে বের করা
          PATH_ID=$(echo "$HTML_CONTENT" | grep -oP '(?<=static.jagobd.com.bd/)[^/]+(?=/aljazeera.stream)' | head -1)

          # যদি মেইন পেজে না পায়, তবে প্লেয়ার গেটওয়ে ট্রাই করা
          if [ -z "$TOKEN" ]; then
            echo "Token not found on main page, trying player gateway..."
            PLAYER_HTML=$(curl -s -L -A "$USER_AGENT" -e "https://www.jagobd.com/aljazeera" "https://tvz.jagobd.com/aljazeera")
            TOKEN=$(echo "$PLAYER_HTML" | grep -o 'wmsAuthSign=[^"&]*' | head -1 | cut -d'=' -f2)
            PATH_ID=$(echo "$PLAYER_HTML" | grep -oP '(?<=static.jagobd.com.bd/)[^/]+(?=/aljazeera.stream)' | head -1)
          fi

          # ৪. ফাইল তৈরি করা
          echo "#EXTM3U" > jagobd.m3u
          if [ ! -z "$TOKEN" ] && [ ! -z "$PATH_ID" ]; then
            FINAL_LINK="https://static.jagobd.com.bd/$PATH_ID/aljazeera.stream/playlist.m3u8?wmsAuthSign=$TOKEN"
            echo "#EXTINF:-1, Al Jazeera English" >> jagobd.m3u
            echo "#EXTVLCOPT:http-referer=https://tvz.jagobd.com/" >> jagobd.m3u
            echo "$FINAL_LINK" >> jagobd.m3u
            echo "SUCCESS: Link generated!"
          else
            echo "# Error: Token or Path ID could not be retrieved from GitHub IP" >> jagobd.m3u
            echo "FAILED: Jagobd is blocking this GitHub runner."
          fi

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add jagobd.m3u
          git commit -m "Auto Update: $(date)" || exit 0
          git push
