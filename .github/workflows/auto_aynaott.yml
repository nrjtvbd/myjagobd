name: AynaOTT Super Auto Update

on:
  schedule:
    - cron: '0 */3 * * *' # প্রতি ৩ ঘণ্টা অন্তর আপডেট হবে
  workflow_dispatch: # ম্যানুয়ালি রান করার অপশন

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install Dependencies
        run: pip install requests
      - name: Run Scraper
        run: python Script/aynaott_auto.py
      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add internal_data.json AynaOTT.m3u
          git commit -m "📺 Auto Update Channels: $(date)" || exit 0
          git push
