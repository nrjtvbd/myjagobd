name: AynaOTT Super Auto Update

on:
  schedule:
    - cron: '0 */3 * * *' # প্রতি ৩ ঘণ্টা অন্তর আপডেট হবে
  workflow_dispatch: # ম্যানুয়ালি রান করার অপশন

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Scraper
        # এখানে এপিআই ব্লক এড়াতে রিট্রাই বা টাইমআউট হ্যান্ডেল করা হয়েছে পাইথন স্ক্রিপ্টে
        run: python Script/aynaott_auto.py

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          # || exit 0 দেওয়ার কারণ হলো যদি কোনো পরিবর্তন না থাকে তবে যাতে এরর না দেয়
          git commit -m "📺 Auto Update Channels: $(date)" || echo "No changes to commit"
          git push || echo "No changes to push"
