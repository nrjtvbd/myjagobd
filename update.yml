name: Jagobd Auto Playlist
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Requests
        run: pip install requests

      - name: Fetch Channels
        run: |
          python -c "
          import requests
          import re
          import os

          channels = {
              'Al Jazeera': 'aljazeera',
              'Somoy TV': 'somoy-tv',
              'Ekattor TV': 'ekattor-tv',
              'BTV World': 'btv-world'
          }

          m3u_text = '#EXTM3U\n'
          found_any = False

          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
              'Referer': 'https://www.jagobd.com/'
          }

          for name, slug in channels.items():
              try:
                  url = f'https://www.jagobd.com/{slug}'
                  res = requests.get(url, headers=headers, timeout=10).text
                  
                  # wmsAuthSign খোঁজার চেষ্টা
                  token_match = re.search(r'wmsAuthSign=([\w.~-]+)', res)
                  
                  if token_match:
                      token = token_match.group(1)
                      link = f'https://static.jagobd.com.bd/live/{slug}.stream/playlist.m3u8?wmsAuthSign={token}'
                      m3u_text += f'#EXTINF:-1, {name}\n'
                      m3u_text += f'#EXTVLCOPT:http-user-agent=Mozilla/5.0\n'
                      m3u_text += f'#EXTVLCOPT:http-referer=https://tvz.jagobd.com/\n'
                      m3u_text += f'{link}\n'
                      found_any = True
                      print(f'Success: {name}')
                  else:
                      print(f'Failed to find token for: {name}')
              except Exception as e:
                  print(f'Error for {name}: {e}')

          # যদি কোনো ডাটা নাও পায়, অন্তত একটি ফাইল তৈরি করবে যাতে এরর না আসে
          if not found_any:
              m3u_text += '# No active channels found at this moment'

          with open('jagobd.m3u', 'w') as f:
              f.write(m3u_text)
          "

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add jagobd.m3u
          git commit -m "Updated Jagobd Playlist" || exit 0
          git push
