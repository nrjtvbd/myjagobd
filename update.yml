name: Update Jagobd Playlist
on:
  schedule:
    - cron: '*/15 * * * *' # প্রতি ১৫ মিনিটে টোকেন আপডেট হবে
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Requests
        run: pip install requests

      - name: Fetch Jagobd Tokens
        run: |
          python -c "
          import requests
          import re
          import base64

          def get_token(channel):
              url = f'https://www.jagobd.com/{channel}'
              headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'}
              try:
                  response = requests.get(url, headers=headers, timeout=10).text
                  # ডাইনামিক টোকেন বা অথ সাইন খোঁজা
                  match = re.search(r'wmsAuthSign=(.*?)\"', response)
                  if match:
                      return match.group(1)
                  # অল্টারনেটিভ সোর্স খোঁজা
                  match_alt = re.search(r'token=(.*?)\"', response)
                  return match_alt.group(1) if match_alt else None
              except:
                  return None

          channels = ['aljazeera', 'somoy-tv', 'ekattor-tv'] # এখানে আরও চ্যানেল যোগ করা যাবে
          m3u_content = '#EXTM3U\n'
          
          for ch in channels:
              token = get_token(ch)
              if token:
                  # জাগোবিডির স্ট্যান্ডার্ড স্ট্রিম ফরম্যাট
                  stream_url = f'https://static.jagobd.com.bd/live/{ch}.stream/playlist.m3u8?wmsAuthSign={token}'
                  m3u_content += f'#EXTINF:-1, Jagobd {ch.upper()}\n'
                  # প্লেয়ারের জন্য রেফারার হেডার মাস্ট
                  m3u_content += f'#EXTVLCOPT:http-referer=https://tvz.jagobd.com/\n'
                  m3u_content += f'{stream_url}\n'
          
          with open('jagobd.m3u', 'w') as f:
              f.write(m3u_content)
          "

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add jagobd.m3u
          git commit -m "Jagobd Playlist Auto Updated" || exit 0
          git push
